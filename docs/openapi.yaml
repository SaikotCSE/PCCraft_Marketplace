      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedSuccessEnvelopeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedSuccessEnvelopeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedSuccessEnvelopeRequest'
      security:
