    VendorRegisterRequest:
      type: object
      description: |-
        Vendor sign-up body -- all 4 steps collapsed for the API call.

        Multipart upload: ``trade_license_doc`` and ``nid_doc`` are required
        file fields. MIME-type validation happens at the model layer via
        ``FileMimeTypeValidator`` (set in ``models.py``).
      properties:
        owner_name:
          type: string
          minLength: 1
          maxLength: 150
        email:
          type: string
          format: email
          minLength: 1
        phone:
          type: string
          minLength: 1
          maxLength: 20
        password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
          minLength: 1
        business_name:
          type: string
          minLength: 1
          maxLength: 180
        business_type:
          allOf:
          - $ref: '#/components/schemas/BusinessTypeEnum'
          default: SOLE_PROP
        business_phone:
          type: string
          maxLength: 20
        trade_license_number:
          type: string
          minLength: 1
          maxLength: 80
        business_address:
          $ref: '#/components/schemas/_BusinessAddressRequest'
        trade_license_doc:
          type: string
          format: binary
        nid_number:
          type: string
          minLength: 1
          maxLength: 40
        nid_doc:
          type: string
          format: binary
        store_name:
          type: string
          maxLength: 120
        store_description:
          type: string
        store_contact_email:
          type: string
          format: email
        vendor_return_policy:
          type: string
        low_stock_threshold:
          type: integer
          maximum: 32767
          minimum: 1
          default: 5
        accept_vendor_terms:
          type: boolean
      required:
      - accept_vendor_terms
      - business_address
      - business_name
      - confirm_password
      - email
      - nid_doc
      - nid_number
      - owner_name
      - password
      - phone
      - trade_license_doc
      - trade_license_number
    VerifyOTPRequest:
      type: object
      description: |-
        Body for ``POST /api/v1/auth/verify-email/``.

        Two fields only: the email (used to look up the user) + the 6-digit
        numeric code. ``email`` is case-normalised in ``validate_email``.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        code:
          type: string
          minLength: 6
          maxLength: 6
      required:
      - code
      - email
    _BusinessAddressRequest:
      type: object
      description: |-
        Bangladesh-style business address -- used as a nested field on
        ``VendorRegisterSerializer``. JSON callers send a real nested object;
        multipart callers send a JSON-encoded string in the same field. The
        JSON-string decode happens in the parent's ``to_internal_value`` so the
        nested serializer's contract stays simple.
      properties:
        street:
          type: string
          minLength: 1
          maxLength: 255
        city:
          type: string
          minLength: 1
          maxLength: 80
        district:
          type: string
          minLength: 1
          maxLength: 80
        postal_code:
          type: string
          default: ''
          maxLength: 20
      required:
      - city
      - district
      - street
