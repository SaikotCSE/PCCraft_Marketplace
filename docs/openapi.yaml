components:
  schemas:
    BlankEnum:
      enum:
      - ''
    BrandListRequest:
      type: object
      description: Compact representation used in dropdowns and pickers.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        slug:
          type: string
          minLength: 1
          maxLength: 140
          pattern: ^[-a-zA-Z0-9_]+$
        logo:
          type: string
          format: binary
          nullable: true
        is_featured:
          type: boolean
        is_active:
          type: boolean
      required:
      - name
      - slug
    BusinessTypeEnum:
      enum:
      - SOLE_PROP
      - PARTNERSHIP
      - PVT_LTD
      - OTHER
      type: string
      description: |-
        * `SOLE_PROP` - Sole proprietorship
        * `PARTNERSHIP` - Partnership
        * `PVT_LTD` - Private limited
        * `OTHER` - Other
    CategoryListRequest:
      type: object
      description: Compact representation used in dropdowns / breadcrumbs.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        slug:
          type: string
          minLength: 1
          maxLength: 140
          pattern: ^[-a-zA-Z0-9_]+$
        icon:
          type: string
          format: binary
          nullable: true
        image:
          type: string
          format: binary
          nullable: true
          title: Banner image
        display_order:
          type: integer
          maximum: 32767
          minimum: 0
        is_active:
          type: boolean
      required:
      - name
      - slug
    CompatibilityAttributeRequest:
      type: object
      description: |-
        Read/write shape for ``CompatibilityAttribute``.

        All fields are exposed because the admin form needs them and the
        table is small enough to render without projection.
