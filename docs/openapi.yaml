openapi: 3.0.3
info:
  title: PCCraft Marketplace API
  version: 1.0.0
  description: REST API for the PCCraft Marketplace platform -- multi-vendor PC components
    e-commerce with recommendations and a data-driven compatibility engine.
paths:
  /api/v1/accounts/change-password/:
    post:
      operationId: accounts_change_password_create
      description: |-
        ``POST /api/v1/auth/change-password/`` -- authenticated.

        Body: ``{current_password, new_password, confirm_new_password}``.
        On success the new password is hashed with Django's password hasher
        and the row is saved. With SimpleJWT there are no Django sessions to
        keep alive (JWT is self-contained), but we still call
        ``update_session_auth_hash`` defensively so DRF's request.user and
        any session-backed middleware see the new hash.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuccessEnvelopeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SuccessEnvelopeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SuccessEnvelopeRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
          description: ''
  /api/v1/accounts/login/:
    post:
      operationId: accounts_login_create
      description: |-
        ``POST /api/v1/auth/login/`` -- public, role-aware.

        On success returns ``{access, refresh, user}`` so the frontend's
        ``useAuthStore.setAuth`` can be called directly.

        Module 9 adds:
          * ``LoginRateThrottle`` -- 5 attempts/min per (email, ip).
          * ``AccountLockoutPolicy`` -- 5 failures → 15-min lockout.
          * ``LoginAttempt`` row written on every attempt (success or
            failure) -- surfaced on the admin "Login attempts" page.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
          description: ''
  /api/v1/accounts/logout/:
    post:
      operationId: accounts_logout_create
      description: '``POST /api/v1/auth/logout/`` -- blacklist the refresh token.'
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuccessEnvelopeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SuccessEnvelopeRequest'
